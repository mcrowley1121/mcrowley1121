name: Latest blog post workflow
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-readme-with-blog:
    name: Update README with latest Substack posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull in Substack posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://mikecrowley2026.substack.com/feed"
